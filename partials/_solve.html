<style>
    @keyframes grow-shrink {
        50% {
            scale: 120%;
        }
    }

    @keyframes fade-in {
        0% {
            opacity: 0;
        }
        100% {
            opacity: 1;
        }
    }

    main {
        min-height: max-content;
    }

    .answer {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-content: center;
        justify-content: center;
        container-type: inline-size;
    }

    .answer__word__letter {
        padding: 0.2em;
        margin-right: -4px;
        font-size: clamp(0.7rem, calc(60cqw / var(--max-word-len)), 1.6rem);
        width: 1em;
        aspect-ratio: 1;
        text-align: center;
        font-family: sans-serif;
        text-transform: uppercase;
        caret-color: transparent;
        border: solid black 4px;
        box-shadow: 3px 3px 2px 0
            color-mix(in srgb, var(--colour-inactive), black 10%);
    }

    .answer__word__letter--revealed {
        background: var(--colour-inactive);
        cursor: none;
        animation: grow-shrink 500ms ease-out 0s normal;
    }

    .answer:valid .answer__word__letter {
        background-color: lightgreen;
    }

    .answer:valid .answer__word__letter--revealed {
        background-color: color-mix(in srgb, lightgreen, black 30%);
    }

    .answer:valid + * > .pill:not(.hidden),
    .answer:invalid + .list > .hidden {
        display: none;
    }

    .answer:not(:has(> .answer__word)) + .list {
        display: none;
    }

    .hint:empty + .explanation + .answer + .list > .pill#show-hint {
        display: none;
    }

    #author:empty {
        display: none;
    }

    .explanation {
        opacity: 0;
        height: auto;
        font-style: italic;
        white-space: pre-wrap;
    }

    .explanation:has(~ .answer:valid) {
        opacity: 1;
    }

    .hint {
        padding: 1em;
    }

    .pill--defn {
        border: solid 3px var(--highlight-defn);
    }

    .pill--inds {
        border: solid 3px var(--highlight-inds);
    }

    .pill--fods {
        border: solid 3px var(--highlight-fods);
    }

    #clue::highlight(definitions) {
        background-color: var(--highlight-defn);
        text-decoration: underline;
    }

    #clue::highlight(indicators) {
        background-color: var(--highlight-inds);
    }

    #clue::highlight(fodders) {
        background-color: var(--highlight-fods);
    }

    .help-list {
        display: none;
    }

    #clue {
        text-align: center;
        font-size: x-large;
        margin-top: auto;
        margin-bottom: auto;
        padding: 0 0.5em;
        height: auto;
        display: block;
    }

    .card__header,
    .card__footer {
        --card-separator: solid 2px var(--colour-active);
        font-size: medium;
        font-weight: normal;
        text-align: center;
        margin: 0;
    }

    .card__header:not(:empty) {
        border-bottom: var(--card-separator);
    }

    .card__footer:not(:empty) {
        border-top: var(--card-separator);
    }
</style>

<section class="card card--clue" style="height: 30svh">
    <div class="card__header">{{cotd_title}}</div>
    <p id="clue"></p>
    <div class="card__footer">
        <span>Author: </span>
        <span id="author"></span>
    </div>
</section>
<dialog class="card hint-dialog">
    <span class="hint header" id="hint"></span>
    <form method="dialog">
        <button class="close">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#1f1f1f"
            >
                <path
                    d="m480-340 180-180-57-56-123 123-123-123-57 56 180 180Zm0 260q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                />
            </svg>
        </button>
    </form>
</dialog>
<h4 class="header explanation" id="explanation"></h4>
<form autocomplete="off" class="answer" id="answer" target="_blank"></form>
<div class="list">
    <button class="pill plausible-event-name=Clue::Show::Hint" id="show-hint">
        Hint
    </button>
    <button
        class="pill plausible-event-name=Clue::Show::Letter"
        id="reveal-letter"
    >
        Reveal letter
    </button>
    <button
        class="pill hidden plausible-event-name=Clue::Solved::Share"
        id="share"
    >
        Share this clue!
    </button>
    <a
        class="pill hidden plausible-event-name=Clue::Solved::Create"
        href="./create.html"
        >Create your own!</a
    >
</div>
<div class="help-list list">
    <button
        disabled
        class="pill pill--defn plausible-event-name=Clue::Show::Defn"
        id="show-defn"
    >
        Definition
    </button>
    <button
        disabled
        class="pill pill--inds plausible-event-name=Clue::Show::Indicators"
        id="show-inds"
    >
        Indicators
    </button>
    <button
        disabled
        class="pill pill--fods plausible-event-name=Clue::Show::Fodders"
        id="show-fods"
    >
        Fodder
    </button>
</div>
<script type="module">
    import { CryptickClue } from '/miniclue/clue.js';
    import { ClueDecoder } from '/miniclue/decoder.js';
    import examples from '/miniclue/examples.js';
    import { History } from '/miniclue/history.js';
    import { Highlighter } from '/miniclue/highlighter.js';

    const clue = new ClueDecoder(examples).decode({{ encoded_clue }});
    const highlighter = new Highlighter(
        document.getElementById('show-defn'),
        document.getElementById('show-inds'),
        document.getElementById('show-fods'),
    );

    const highlight = highlighter.process(clue.clue);

    const isHighlightedClue = clue.clue !== highlight.cleaned;

    if (isHighlightedClue) {
        clue.clue = highlight.cleaned;
    }

    const answer = document.getElementById('answer');

    const miniClue = new CryptickClue(
        answer,
        document.getElementById('clue'),
        document.getElementById('author'),
        document.getElementById('hint'),
        document.getElementById('explanation'),
        document.getElementById('reveal-letter'),
        document.getElementById('show-hint'),
        document.getElementById('share'),
    );

    if ('virtualKeyboard' in navigator) {
        answer.addEventListener('focusin', (_) => {
            navigator.virtualKeyboard.show();
        });

        answer.addEventListener('focusout', (event) => {
            if (!answer.contains(event.relatedTarget)) {
                navigator.virtualKeyboard.show();
            }
        });
    }

    document.getElementById('share').addEventListener('click', async (_) => {
        if (navigator.share) {
            await navigator.share({
                title: 'Cryptick',
                text: `⭐️I solved ${clue.author ? clue.author + "'s" : 'a'} {{ message }} on Cryptick!✅\n\n${clue.clue} (${clue.enumeration})\n\n`,
                url: window.location,
            });
        } else {
            miniClue.shareMessage(window.location, navigator.clipboard);
        }
    });

    miniClue.renderClue(clue);

    if (isHighlightedClue) {
        highlighter.render(highlight, document.getElementById('clue'));
        document.querySelector('.help-list').style.display = 'flex';
    }

    new History(localStorage).add({{ encoded_clue }});
</script>
