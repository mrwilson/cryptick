<section class="card card--clue">
    <a
        class="card__top header plausible-event-name={{namespace}}::COTD::Solve"
        id="solve"
        href="./cotd/{{ date }}.html"
        >{{clue}}
    </a>
    <h4 class="card__title">
        COTD #{{id}} | {{ friendlyDate }} | Author:
        <a
            class="author plausible-event-name={{namespace}}::COTD::Author"
            href="{{author_link}}"
            >{{author_name}}</a
        >
    </h4>
</section>
