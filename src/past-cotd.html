<style>
    main {
        justify-items: center;
        overflow-y: auto;
        overflow-x: hidden;
        height: 100%;
        scroll-snap-type: y proximity;
    }

    .card--clue {
        height: max-content;
        .card__top {
            height: 4em;
        }

        .card__title {
            height: 1em;
        }

        &:nth-of-type(2n + 1) {
            scroll-snap-stop: always;
            scroll-snap-align: start;
        }

        padding-bottom: 0.5em;
        margin-bottom: 0.5em;
    }
</style>

{{#each clues}}
<section class="card card--clue">
    <a
        class="card__top header plausible-event-name=Home::COTD::Solve"
        id="solve"
        href="./cotd/{{ date }}.html"
        >{{clue}}
    </a>
    <h4 class="card__title">
        COTD | {{ friendlyDate }} | Author:
        <a
            class="author link plausible-event-name=Home::COTD::Author"
            href="{{author_link}}"
            >{{author_name}}</a
        >
    </h4>
</section>
{{/each}}
