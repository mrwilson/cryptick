<style>
    main {
        grid-template: 'maker' auto 'copy' 15%;
    }

    .clue_maker {
        grid-row: 1;
        row-gap: 0.5em;
    }

    .clue_maker__input {
        border: none;
        border-radius: 5px;
        width: 100%;
        box-sizing: border-box;
        display: block;
    }

    .clue_maker__input--answer {
        text-transform: uppercase;
    }

    .clue_maker__label {
        display: block;
        text-align: left;
        color: var(--colour-active);
        padding: 0.5em 0;
    }

    .clue_maker:invalid + .list > .pill {
        pointer-events: none;
        background: var(--colour-inactive);
        box-shadow: 2px 2px 2px 0 var(--colour-inactive-shadow);
    }

    .list {
        grid-row: 2;
    }
</style>
<form class="clue_maker" autocomplete="off">
    <label class="clue_maker__label" for="clue">Clue</label>
    <textarea
        class="input clue_maker__input input--clue"
        id="clue"
        name="clue"
        placeholder="Slam nonsense tales"
        required
        minlength="1"
        rows="3"
        autocomplete="off"
    ></textarea>
    <label class="clue_maker__label" for="answer">Answer</label>
    <input
        class="input clue_maker__input clue_maker__input--answer"
        id="answer"
        name="answer"
        placeholder="SLATE"
        required
        minlength="1"
        maxlength="20"
        autocomplete="off"
    />
    <label class="clue_maker__label" for="hint">Hint (Optional)</label>
    <textarea
        class="input clue_maker__input"
        id="hint"
        name="hint"
        placeholder="'Nonsense' indicates an anagram of nearby letters"
        rows="2"
        autocomplete="off"
    ></textarea>
    <label class="clue_maker__label" for="explanation"
        >Explanation (Optional)</label
    >
    <textarea
        class="input clue_maker__input"
        id="explanation"
        name="explanation"
        placeholder="SLATE*"
        rows="1"
        autocomplete="off"
    ></textarea>
    <label class="clue_maker__label" for="author">Author (Optional)</label>
    <input
        class="input clue_maker__input"
        id="author"
        name="author"
        placeholder="Wildvale"
        minlength="1"
        maxlength="20"
    />
</form>
<div class="list">
    <button class="pill plausible-event-name=Create::Copy" id="copy">
        Copy
    </button>
    <button class="pill plausible-event-name=Create::Share" id="share">
        Share
    </button>
    <button class="pill plausible-event-name=Create::Open" id="open">
        Open
    </button>
</div>
<script type="module">
    import { CreateCryptick } from './miniclue/create.js';

    let create = new CreateCryptick(
        document.getElementById('clue'),
        document.getElementById('answer'),
        document.getElementById('hint'),
        document.getElementById('explanation'),
        document.getElementById('author'),
    );

    document.getElementById('copy').addEventListener('click', (e) => {
        const copyText = create.copyText(window.location.origin + '/clue.html');

        navigator.clipboard.writeText(copyText);
        e.target.textContent = 'Copied!';
    });

    document.getElementById('share').addEventListener('click', async () => {
        const shareData = create.shareData(
            window.location.origin + '/clue.html',
        );

        await navigator.share(shareData);
    });

    document.getElementById('open').addEventListener('click', () => {
        window.open(create.fragment('/clue.html')).focus();
    });
</script>
