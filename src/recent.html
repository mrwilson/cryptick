<style>
    main {
        justify-items: center;
        overflow-y: auto;
        overflow-x: hidden;
        height: 100%;
        scroll-snap-type: y proximity;
    }

    .card--clue {
        height: max-content;
        .card__top {
            height: 4em;
        }

        .card__title {
            height: 1em;
        }

        &:nth-of-type(2n + 1) {
            scroll-snap-stop: always;
            scroll-snap-align: start;
        }

        padding-bottom: 0.5em;
        margin-bottom: 0.5em;
    }
</style>

<script type="module">
    import { Highlighter } from './miniclue/highlighter.js';

    const list = document.querySelector('main');

    import { ClueDecoder } from './miniclue/decoder.js';
    import examples from './miniclue/examples.js';
    import { enumerate } from './miniclue/utils.js';
    import { History } from './miniclue/history.js';

    const decoder = new ClueDecoder(examples);
    const highlighter = new Highlighter();

    for (const clue of new History(localStorage).get().reverse()) {
        let l = document.createElement('section');
        l.classList.add('card', 'card--clue');

        try {
            let link = document.createElement('a');

            let c = decoder.decode(clue);
            let trueClue = highlighter.process(c.clue).cleaned;
            link.href = `./clue.html${clue}`;
            link.classList.add(
                'card__top',
                'header',
                'plausible-event-name={{namespace}}::COTD::Solve',
            );
            link.textContent = `${trueClue} (${enumerate(c.answer)})`;

            let title = document.createElement('h4');
            title.textContent = `Author: ${c.author || '???'}`;
            title.classList.add('card__title');

            l.appendChild(link);
            l.appendChild(title);

            list.appendChild(l);
        } catch (e) {}
    }
</script>
