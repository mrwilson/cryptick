<style>
    @keyframes grow-shrink {
        50% {
            scale: 120%;
        }
    }

    @keyframes fade-in {
        0% {
            opacity: 0;
        }
        100% {
            opacity: 1;
        }
    }

    main {
        min-height: max-content;
    }

    .answer {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-content: center;
        justify-content: center;
        container-type: inline-size;
    }

    .answer__word__letter {
        padding: 0.2em;
        margin-right: -4px;
        font-size: clamp(0.7rem, calc(60cqw / var(--max-word-len)), 1.6rem);
        width: 1em;
        aspect-ratio: 1;
        text-align: center;
        font-family: sans-serif;
        text-transform: uppercase;
        caret-color: transparent;
        border: solid black 4px;
        box-shadow: 3px 3px 2px 0
            color-mix(in srgb, var(--colour-inactive), black 10%);
    }

    .answer__word__letter--revealed {
        background: var(--colour-inactive);
        cursor: none;
        animation: grow-shrink 500ms ease-out 0s normal;
    }

    .answer:valid .answer__word__letter {
        background-color: lightgreen;
    }

    .answer:valid .answer__word__letter--revealed {
        background-color: color-mix(in srgb, lightgreen, black 30%);
    }

    .answer:valid + .list > .pill:not(.hidden),
    .answer:invalid + .list > .hidden {
        display: none;
    }

    .answer:not(:has(> .answer__word)) + .list {
        display: none;
    }

    .hint:empty + .explanation + .answer + .list > .pill#show-hint {
        display: none;
    }

    .explanation {
        opacity: 0;
        height: auto;
        font-style: italic;
        white-space: pre-wrap;
    }

    .explanation:has(~ .answer:valid) {
        opacity: 1;
    }

    .card--clue[open] + .explanation + .answer + .list > .pill#show-hint {
        pointer-events: none;
        background: var(--colour-inactive);
        box-shadow: 2px 2px 2px 0 var(--colour-inactive-shadow);
        cursor: not-allowed;
    }

    .card--clue[open] > #hint {
        animation: fade-in 2s ease-in-out;
        animation-fill-mode: forwards;
    }
</style>

<details class="card card--clue" style="height: 30svh">
    <summary class="card__top" style="height: 25svh" id="clue"></summary>
    <p class="card__title" id="hint"></p>
</details>
<h4 class="header explanation" id="explanation"></h4>
<form class="answer" id="answer" target="_blank"></form>
<div class="list">
    <button class="pill plausible-event-name=Clue::Show::Hint" id="show-hint">
        Show hint
    </button>
    <button
        class="pill plausible-event-name=Clue::Show::Letter"
        id="reveal-letter"
    >
        Show letter
    </button>
    <button class="pill plausible-event-name=Clue::Show::Word" id="reveal-all">
        Show word
    </button>
    <button
        class="pill hidden plausible-event-name=Clue::Solved::Share"
        id="share"
    >
        Share this clue!
    </button>
    <a
        class="pill hidden plausible-event-name=Clue::Solved::Create"
        href="./create.html"
        >Create your own!</a
    >
</div>
<script type="module">
    import { CryptickClue } from './miniclue/clue.js';
    import { ClueDecoder } from './miniclue/decoder.js';
    import examples from './miniclue/examples.js';
    import { History } from './miniclue/history.js';

    const clue = new ClueDecoder(examples).decode(window.location.hash);

    const miniClue = new CryptickClue(
        document.getElementById('answer'),
        document.getElementById('clue'),
        document.getElementById('hint'),
        document.getElementById('explanation'),
        document.getElementById('reveal-letter'),
        document.getElementById('reveal-all'),
        document.getElementById('show-hint'),
        document.getElementById('share'),
    );

    document.getElementById('share').onclick = (_) =>
        miniClue.shareMessage(window.location, navigator.clipboard);

    miniClue.renderClue(clue);

    new History(localStorage).add(window.location.hash);
</script>
