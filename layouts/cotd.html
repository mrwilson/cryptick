<!doctype html>
<html lang="en">
    <head>
        <script
            async
            src="https://plausible.io/js/pa-nSHTBj0a2hbn-FVrrHdwg.js"
        ></script>
        <script>
            ((window.plausible =
                window.plausible ||
                function () {
                    (plausible.q = plausible.q || []).push(arguments);
                }),
                (plausible.init =
                    plausible.init ||
                    function (i) {
                        plausible.o = i || {};
                    }));
            plausible.init({});
        </script>
        <title>Cryptick Clue of the Day | {{ friendlyDate }}</title>
        <meta name="theme-color" content="#286433" />
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no, interactive-widget=resizes-content"
        />
        <meta name="keywords" content="cryptic, crossword, clues" />
        <meta name="description" content="{{clue}}" />
        <meta
            property="og:title"
            content="Clue of the Day | {{ friendlyDate }}"
        />
        <meta
            property="og:site_name"
            content="Cryptick{{#if redirect}} Clue of the Day{{/if}}"
        />
        <meta property="og:description" content="{{clue}}" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:creator" content="{{ author_name }}" />
        <meta property="profile:username" content="{{ author_name }}" />
        <meta
            property="release:repository"
            content="https://github.com/mrwilson/cryptick"
        />
        <link rel="manifest" href="../manifest.json" />
        <link rel="stylesheet" href="../base.css" />
        <link rel="icon" href="../logo.svg" />
        <script type="module">
            import ErrorHandler from '../miniclue/errors.js';
            new ErrorHandler().bind(window);
        </script>
    </head>
    <body>
        {{> header }}
        <main>
            <style>
                @keyframes grow-shrink {
                    50% {
                        scale: 120%;
                    }
                }

                @keyframes fade-in {
                    0% {
                        opacity: 0;
                    }
                    100% {
                        opacity: 1;
                    }
                }

                main {
                    min-height: max-content;
                }

                .answer {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 1rem;
                    align-content: center;
                    justify-content: center;
                    container-type: inline-size;
                }

                .answer__word__letter {
                    padding: 0.2em;
                    margin-right: -4px;
                    font-size: clamp(
                        0.7rem,
                        calc(60cqw / var(--max-word-len)),
                        1.6rem
                    );
                    width: 1em;
                    aspect-ratio: 1;
                    text-align: center;
                    font-family: sans-serif;
                    text-transform: uppercase;
                    caret-color: transparent;
                    border: solid black 4px;
                    box-shadow: 3px 3px 2px 0
                        color-mix(in srgb, var(--colour-inactive), black 10%);
                }

                .answer__word__letter--revealed {
                    background: var(--colour-inactive);
                    cursor: none;
                    animation: grow-shrink 500ms ease-out 0s normal;
                }

                .answer:valid .answer__word__letter {
                    background-color: lightgreen;
                }

                .answer:valid .answer__word__letter--revealed {
                    background-color: color-mix(in srgb, lightgreen, black 30%);
                }

                .answer:valid + .list > .pill:not(.hidden),
                .answer:invalid + .list > .hidden {
                    display: none;
                }

                .answer:not(:has(> .answer__word)) + .list {
                    display: none;
                }

                .hint:empty + .explanation + .answer + .list > .pill#show-hint {
                    display: none;
                }

                .explanation {
                    opacity: 0;
                    height: auto;
                    font-style: italic;
                    white-space: pre-wrap;
                }

                .explanation:has(~ .answer:valid) {
                    opacity: 1;
                }

                .hint {
                    padding: 1em;
                }
            </style>

            <section class="card card--clue" style="height: 30svh">
                <span class="card__top" id="clue"></span>
                <h4 class="card__title">
                    COTD #{{id}} | {{ friendlyDate }} | Author:
                    <a
                        class="link author plausible-event-name=COTD::Historic::Author"
                        href="{{author_link}}"
                        id="author"
                        >{{author_name}}</a
                    >
                </h4>
            </section>
            <dialog class="card hint-dialog">
                <span class="hint header" id="hint"></span>
                <form method="dialog">
                    <button class="close">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            height="24px"
                            viewBox="0 -960 960 960"
                            width="24px"
                            fill="#1f1f1f"
                        >
                            <path
                                d="m480-340 180-180-57-56-123 123-123-123-57 56 180 180Zm0 260q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                            />
                        </svg>
                    </button>
                </form>
            </dialog>
            <h4 class="header explanation" id="explanation"></h4>
            <form
                autocomplete="off"
                class="answer"
                id="answer"
                target="_blank"
            ></form>
            <div class="list">
                <button
                    class="pill plausible-event-name=Clue::Show::Hint"
                    id="show-hint"
                >
                    Show hint
                </button>
                <button
                    class="pill plausible-event-name=Clue::Show::Letter"
                    id="reveal-letter"
                >
                    Show letter
                </button>
                <button
                    class="pill hidden plausible-event-name=Clue::Solved::Share"
                    id="share"
                >
                    Share this clue!
                </button>
                <a
                    class="pill hidden plausible-event-name=Clue::Solved::Create"
                    href="./create.html"
                    >Create your own!</a
                >
            </div>
            <script type="module">
                import { CryptickClue } from '../miniclue/clue.js';
                import { ClueDecoder } from '../miniclue/decoder.js';
                import examples from '../miniclue/examples.js';
                import { History } from '../miniclue/history.js';

                const clue = new ClueDecoder(examples).decode('#{{ hash }}');

                const miniClue = new CryptickClue(
                    document.getElementById('answer'),
                    document.getElementById('clue'),
                    document.getElementById('author'),
                    document.getElementById('hint'),
                    document.getElementById('explanation'),
                    document.getElementById('reveal-letter'),
                    document.getElementById('show-hint'),
                    document.getElementById('share'),
                );

                document
                    .getElementById('share')
                    .addEventListener('click', async (_) => {
                        if (navigator.share) {
                            await navigator.share({
                                title: 'Cryptick',
                                text: `⭐️I solved the Clue of the Day on Cryptick!✅\n\n${clue.clue} (${clue.enumeration})\n\n`,
                                url: window.location,
                            });
                        } else {
                            miniClue.shareMessage(
                                window.location,
                                navigator.clipboard,
                            );
                        }
                    });

                miniClue.renderClue(clue);

                new History(localStorage).add('#{{ hash }}');
            </script>
        </main>
        {{> footer }}
    </body>
</html>
